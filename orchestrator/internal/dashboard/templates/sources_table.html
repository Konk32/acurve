{{define "sources-table"}}
<table id="sources-table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Kind</th>
      <th>URL</th>
      <th>Last scraped</th>
      <th>Enabled</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {{range .}}
    <tr>
      <td><strong>{{.Name}}</strong></td>
      <td><span class="badge badge-{{.Kind}}">{{.Kind}}</span></td>
      <td><a href="{{.URL}}" target="_blank" rel="noopener noreferrer">{{.URL}}</a></td>
      <td class="muted">
        {{if .LastScrapedAt}}{{.LastScrapedAt.Format "2006-01-02 15:04"}}{{else}}never{{end}}
      </td>
      <td>{{if .Enabled}}✓{{else}}<span class="muted">—</span>{{end}}</td>
      <td class="actions">
        <button hx-patch="/dashboard/sources/{{.ID}}/toggle"
                hx-target="#sources-table"
                hx-swap="outerHTML"
                class="secondary outline">
          {{if .Enabled}}Disable{{else}}Enable{{end}}
        </button>
        <button hx-delete="/dashboard/sources/{{.ID}}"
                hx-target="#sources-table"
                hx-swap="outerHTML"
                hx-confirm="Delete {{.Name}}?"
                class="contrast outline">
          Delete
        </button>
      </td>
    </tr>
    {{end}}
    {{if not .}}
    <tr><td colspan="6" class="muted">No sources yet — add one below.</td></tr>
    {{end}}
  </tbody>
</table>
{{end}}
