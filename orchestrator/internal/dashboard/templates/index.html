<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>acurve</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <style>
    body { max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem; }
    header { border-bottom: 1px solid var(--pico-muted-border-color); margin-bottom: 2rem; padding-bottom: 1rem; }
    header h1 { margin: 0; font-size: 1.5rem; }
    header small { font-weight: normal; color: var(--pico-muted-color); font-size: 0.9rem; }
    .badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 0.15em 0.55em;
             border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-rss     { background: #e8f5e9; color: #2e7d32; }
    .badge-youtube { background: #ffebee; color: #c62828; }
    .badge-reddit  { background: #fff3e0; color: #bf360c; }
    table td:nth-child(3) { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .actions { display: flex; gap: 0.4rem; }
    .actions button { margin: 0; padding: 0.3em 0.75em; font-size: 0.8rem; }
    .muted { color: var(--pico-muted-color); font-size: 0.85rem; }
    .add-form .grid { grid-template-columns: 2fr 1fr 3fr auto; gap: 0.5rem; align-items: end; }
    .add-form fieldset { margin: 0; }
  </style>
</head>
<body>
  <header>
    <h1>acurve <small>— IT news digest</small></h1>
  </header>

  <main>
    <section>
      <h2>Sources</h2>
      {{template "sources-table" .Sources}}

      <details>
        <summary>Add source</summary>
        <form class="add-form"
              hx-post="/dashboard/sources"
              hx-target="#sources-table"
              hx-swap="outerHTML"
              hx-on::after-request="this.reset()">
          <div class="grid">
            <label>
              Name
              <input name="name" placeholder="e.g. Hacker News" required>
            </label>
            <label>
              Kind
              <select name="kind">
                <option value="rss">RSS</option>
                <option value="youtube">YouTube</option>
                <option value="reddit">Reddit</option>
              </select>
            </label>
            <label>
              URL
              <input name="url" placeholder="https://…" required>
            </label>
            <label>
              &nbsp;
              <button type="submit">Add</button>
            </label>
          </div>
        </form>
      </details>
    </section>

    <section>
      <h2>Next digest</h2>
      <div hx-get="/dashboard/digest-preview" hx-trigger="load" hx-swap="innerHTML">
        <span aria-busy="true">Loading…</span>
      </div>
    </section>
  </main>
</body>
</html>
