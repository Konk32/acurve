apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: acurve
  namespace: acurve
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h

  values:
    controllers:
      # ── Orchestrator (long-running API server) ──────────────────────────────
      orchestrator:
        type: deployment
        containers:
          main:
            image:
              repository: ghcr.io/konk32/acurve-orchestrator
              tag: main
            env:
              MIGRATIONS_DIR: /migrations
              PORT: "8080"
            envFrom:
              - secretRef:
                  name: acurve-secrets
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 128Mi

      # ── Scraper CronJob (every 3 h) ─────────────────────────────────────────
      scraper:
        type: cronjob
        cronjob:
          schedule: "0 */3 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          main:
            image:
              repository: ghcr.io/konk32/acurve-scraper
              tag: main
            envFrom:
              - secretRef:
                  name: acurve-secrets
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi

      # ── Summarizer CronJob (every 30 min, picks up unsummarized items) ───────
      summarizer:
        type: cronjob
        cronjob:
          schedule: "*/30 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          main:
            image:
              repository: ghcr.io/konk32/acurve-summarizer
              tag: main
            env:
              ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"
              BATCH_SIZE: "20"
            envFrom:
              - secretRef:
                  name: acurve-secrets
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi

      # ── Digest CronJob (07:00 + 19:00 Oslo time) ────────────────────────────
      digest:
        type: cronjob
        cronjob:
          schedule: "0 7,19 * * *"
          timeZone: "Europe/Oslo"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 5
          failedJobsHistory: 3
        containers:
          main:
            image:
              repository: curlimages/curl
              tag: latest
            command:
              - curl
              - --silent
              - --fail
              - --retry
              - "3"
              - -X
              - POST
              - http://orchestrator.acurve.svc.cluster.local/api/digest/send
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 32Mi

    # ── Services ──────────────────────────────────────────────────────────────
    service:
      orchestrator:
        controller: orchestrator
        ports:
          http:
            port: 80
            targetPort: 8080

    # ── Ingress ───────────────────────────────────────────────────────────────
    ingress:
      orchestrator:
        className: nginx
        hosts:
          - host: acurve.internal
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: orchestrator
                  port: http
