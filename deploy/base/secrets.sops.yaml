---
# Postgres credentials — consumed by the CNPG Cluster bootstrap AND
# the app services via DB_URL.
apiVersion: v1
kind: Secret
metadata:
  name: acurve-postgres-credentials
  namespace: acurve
stringData:
  username: acurve
  password: CHANGE_ME  # replace before encrypting with sops
---
# Application secrets — consumed by orchestrator, scraper, summarizer.
apiVersion: v1
kind: Secret
metadata:
  name: acurve-secrets
  namespace: acurve
stringData:
  # Built from the CNPG RW service name: <cluster>-rw.<namespace>.svc.cluster.local
  DB_URL: "postgres://acurve:CHANGE_ME@acurve-postgres-rw.acurve.svc.cluster.local:5432/acurve"
  DISCORD_WEBHOOK_URL: "CHANGE_ME"
  # Anthropic provider
  ANTHROPIC_API_KEY: "CHANGE_ME"
  # Ollama provider (leave empty if using Anthropic)
  OLLAMA_URL: ""
