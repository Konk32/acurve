services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acurve
      POSTGRES_PASSWORD: acurve
      POSTGRES_DB: acurve
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acurve"]
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      DB_URL: postgres://acurve:acurve@postgres:5432/acurve
      MIGRATIONS_DIR: /migrations
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    environment:
      DB_URL: postgres://acurve:acurve@postgres:5432/acurve
    depends_on:
      postgres:
        condition: service_healthy
    # Run once then exit (mirrors CronJob behaviour)
    profiles: ["scrape"]

  summarizer:
    build:
      context: .
      dockerfile: summarizer/Dockerfile
    environment:
      DB_URL: postgres://acurve:acurve@postgres:5432/acurve
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      # Anthropic provider (default)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      # Ollama provider (set LLM_PROVIDER=ollama)
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:12b}
      BATCH_SIZE: ${BATCH_SIZE:-20}
    depends_on:
      postgres:
        condition: service_healthy
    # Run once then exit (mirrors CronJob behaviour)
    profiles: ["summarize"]

volumes:
  postgres_data:
